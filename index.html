function wom(d){return Math.ceil(new Date(d).getDate()/7)}
function iqe(d){return[2,5,8,11].includes(new Date(d).getMonth())}
function fd(d){return new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function fdt(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function fds(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function gtpl(mid,vl){const k=mid+'__'+vl;if(D.tpl&&D.tpl[k])return D.tpl[k];for(const m of M)if(m.id===mid)for(const v of m.v)if(v.l===vl)return v.dt;return''}
function stpl(mid,vl,txt){if(!D.tpl)D.tpl={};D.tpl[mid+'__'+vl]=txt;sv(D)}
function smsLink(ph,body){return'sms:'+ph.join(',')+'?body='+encodeURIComponent(body)}
function parseVCF(t){const cards=t.split('BEGIN:VCARD').filter(c=>c.trim());return cards.map(c=>{const ls=c.split(/\r?\n/);let n='',p='';for(const l of ls){if(l.startsWith('FN:')||l.startsWith('FN;'))n=l.split(':').slice(1).join(':').trim();if(!n&&l.startsWith('N:')){const pts=l.split(':').slice(1).join(':').split(';');n=[pts[1],pts[0]].filter(Boolean).join(' ').trim()}if(l.match(/^TEL[;:]/i)){const ph=l.split(':').slice(1).join(':').trim();if(ph&&!p)p=ph}}return{name:n,phone:p}}).filter(c=>c.name||c.phone)}
function resR(roles){return(D.contacts||[]).filter(c=>roles.includes(c.role))}
function isExcl(phone){return D.excludeMe&&phone&&phone.replace(/\D/g,'')===D.excludeMe.replace(/\D/g,'')}
function addHist(type,title,cnt){if(!D.history)D.history=[];D.history.unshift({type,title,count:cnt,date:new Date().toISOString()});if(D.history.length>100)D.history=D.history.slice(0,100);sv(D)}

function getUp(days){const now=new Date(),res=[];for(let d=0;d<=days;d++){const dt=new Date(now);dt.setDate(dt.getDate()+d);const dow=dt.getDay(),wk=wom(dt),qe=iqe(dt);for(const m of M){if(m.dow!==dow)continue;for(const v of m.v){if(!v.w.includes(wk))continue;if(v.qe===true&&!qe)continue;if(v.qe===false&&qe)continue;let tpl=gtpl(m.id,v.l).replace('{weekOrd}',ord(wk));res.push({mid:m.id,name:m.n,vl:v.l,date:new Date(dt),time:m.t,loc:m.loc,roles:v.r,note:v.nt,tpl,du:d})}}}return res.sort((a,b)=>a.date-b.date)}

// Schedule item due logic
function daysBetween(a,b){return Math.floor((new Date(a)-new Date(b))/864e5)}
function isSchedDue(si){
  if(si.done)return false;
  const now=new Date(),today=now.toISOString().slice(0,10);
  // Recurring: every X days since last contact
  if(si.recurDays>0){
    const lastContact=getLastContactDate(si);
    if(lastContact){if(daysBetween(today,lastContact)>=si.recurDays)return true}
    else{if(daysBetween(today,si.dateAdded.slice(0,10))>=si.recurDays)return true}
  }
  // Aim For: 3 days before
  if(si.aimForDate){const d=daysBetween(si.aimForDate,today);if(d>=0&&d<=3)return true}
  // No Later Than: 3 days before
  if(si.noLaterDate){const d=daysBetween(si.noLaterDate,today);if(d>=0&&d<=3)return true}
  // If no reminders set, it's always "active" but not "due"
  return false;
}
function getLastContactDate(si){
  if(!si.log||!si.log.length)return null;
  const contacts=si.log.filter(l=>l.type!=='note');
  if(!contacts.length)return null;
  return contacts[0].ts.slice(0,10); // log is newest-first
}
function getDueItems(){return(D.schedItems||[]).filter(si=>!si.done&&isSchedDue(si))}
function getActiveItems(){return(D.schedItems||[]).filter(si=>!si.done)}
function getDoneItems(){return(D.schedItems||[]).filter(si=>si.done)}

// Notifications — schedule-on-change approach
async function enableNotif(){if(!('Notification' in window)){alert('Not supported.');return}const p=await Notification.requestPermission();if(p==='granted'){D.notifEnabled=true;sv(D);schedAllNotifs();toast('Enabled!');render()}else alert('Denied.')}
function schedAllNotifs(){
  if(!D.notifEnabled||!('serviceWorker' in navigator)||!navigator.serviceWorker.controller)return;
  const now=new Date();
  // 1. Meeting reminders for tomorrow
  const up=getUp(2).filter(m=>m.du===1);
  if(up.length){
    const tgt=new Date(now);tgt.setHours(D.notifHour||14,D.notifMin||0,0,0);
    let dl=tgt-now;if(dl<0)dl=0;
    navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIFICATION',title:'Ward Reminders Ready',body:up.length+' reminder'+(up.length>1?'s':'')+' for tomorrow: '+up.map(m=>m.name).join(', '),delay:Math.max(0,dl),tag:'ward-reminder'});
  }
  // 2. Schedule item reminders
  const dueItems=getDueItems();
  if(dueItems.length){
    const tgt2=new Date(now);tgt2.setHours(Math.min((D.notifHour||14)+1,20),0,0,0);
    let dl2=tgt2-now;if(dl2<0)dl2=60000; // if past time, fire in 1 min
    const names=dueItems.slice(0,5).map(s=>s.name).join(', ')+(dueItems.length>5?' +more':'');
    navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIFICATION',title:'Schedule Follow-ups Due',body:dueItems.length+' item'+(dueItems.length>1?'s':'')+' need attention: '+names,delay:Math.max(0,dl2),tag:'ward-schedule-due'});
  }
}
function testNotif(){if(!('Notification' in window)){alert('Not supported.');return}if(Notification.permission!=='granted'){Notification.requestPermission().then(p=>{if(p==='granted')doTest();else alert('Denied.')});return}doTest()}
function doTest(){const nxt=new Date();nxt.setDate(nxt.getDate()+(7-nxt.getDay())%7||7);const wk=wom(nxt);const vr=M[0].v.find(v=>v.w.includes(wk))||M[0].v[0];const rc=resR(vr.r).length;const title='Ward Reminders Ready';const body='2 meeting reminders to send for tomorrow: Ward Council ('+vr.l+'), Bishopric Meeting \u2014 '+rc+' recipients ready';if(navigator.serviceWorker&&navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIFICATION',title,body,delay:3000,tag:'ward-reminder'});toast('Test notification in 3 seconds...')}else{setTimeout(()=>new Notification(title,{body,vibrate:[200,100,200],tag:'ward-test',requireInteraction:true}),3000);toast('Test notification in 3 seconds...')}}

// SW registration + message listener for navigation
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(()=>{schedAllNotifs()}).catch(e=>console.log('SW:',e));
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data&&e.data.type==='NAVIGATE'&&e.data.tab)go(e.data.tab);
  });
}

h+='<div class="rgrp"><p class="rgrp-l" style="display:flex;justify-content:space-between;align-items:center">'+esc(org)+' ('+mems.length+')<button class="btn-sm btn-sm-g" style="padding:2px 8px;font-size:9.5px" onclick="compOrgTog(\''+esc(org)+'\')">'+(orgCnt===mems.length?'Deselect':'Select')+' All</button></p>';
mems.forEach(c=>{h+='<label class="cpick-item '+(compSel[c.id]?'selected':'')+'"><input type="checkbox" '+(compSel[c.id]?'checked':'')+' onchange="compSel[\''+c.id+'\']=this.checked;rComp()"><span style="font-weight:600">'+esc(c.name)+'</span><span style="color:var(--muted);font-size:10.5px">'+esc(c.role)+'</span></label>'});
h+='</div>'});
if(!Object.keys(orgGrps).length)h+='<p class="hint">No contacts with phone numbers.</p>';
h+='</div><div class="send-pair"><button class="send-grp" onclick="compSend(\'group\')"'+(cnt===0?' disabled style="opacity:.5"':'')+'>\uD83D\uDCF1 Group (MMS) ('+cnt+')</button><button class="send-ind" onclick="compSend(\'individual\')"'+(cnt===0?' disabled style="opacity:.5"':'')+'>\uD83D\uDCF1 Individual (SMS) ('+cnt+')</button></div>';
el.innerHTML=h}
function compOrgTog(org){const allC=(D.contacts||[]).filter(c=>c.phone);const mems=allC.filter(c=>roleToOrg(c.role)===org);const filt=mems.filter(c=>!compSrch||c.name.toLowerCase().includes(compSrch.toLowerCase())||c.role.toLowerCase().includes(compSrch.toLowerCase())||roleToOrg(c.role).toLowerCase().includes(compSrch.toLowerCase()));const allSel=filt.every(c=>compSel[c.id]);filt.forEach(c=>{compSel[c.id]=!allSel});rComp()}
function compAll(v){(D.contacts||[]).filter(c=>c.phone).forEach(c=>{if(!compSrch||c.name.toLowerCase().includes(compSrch.toLowerCase())||c.role.toLowerCase().includes(compSrch.toLowerCase())||roleToOrg(c.role).toLowerCase().includes(compSrch.toLowerCase()))compSel[c.id]=v});rComp()}
function compSend(mode){const msg=document.getElementById('comp-msg')?.value;if(!msg||!msg.trim()){alert('Write a message.');return}const ph=(D.contacts||[]).filter(c=>compSel[c.id]&&c.phone).map(c=>c.phone);if(!ph.length){alert('No recipients.');return}doSend(ph,msg,'compose','Custom message',mode);compSel={}}

// ============ Schedule Tab ============
let showSF=false,schedEditId=null,showDone=false;
function getSchedDraft(si){
  if(si.draftMsg)return si.draftMsg;
  return SCHED_DRAFT_TPL.replace('{name}',si.name);
}
function getBishopricNames(){
  return(D.contacts||[]).filter(c=>['Bishop','1st Counselor','2nd Counselor'].includes(c.role)).map(c=>c.role+': '+c.name);
}

function rSched(){const el=document.getElementById('tab-schedule');
const active=getActiveItems(),dueIds=new Set(getDueItems().map(d=>d.id)),done=getDoneItems();
// Sort: due items first, then by dateAdded
const sorted=[...active].sort((a,b)=>{const ad=dueIds.has(a.id)?0:1,bd=dueIds.has(b.id)?0:1;if(ad!==bd)return ad-bd;return new Date(b.dateAdded)-new Date(a.dateAdded)});

let h='<h2 class="stitle">Schedule</h2><p class="hint">Track people Bishop needs to meet with. Log each contact attempt.</p>';
h+='<button class="btn-p mb" onclick="showSF=true;schedEditId=null;render()">+ Add Person</button>';

if(showSF)h+=renderSchedForm();

if(!sorted.length&&!showSF)h+='<div class="empty"><p class="empty-i">\uD83D\uDCC5</p><p class="empty-t">No one scheduled. Tap + to add.</p></div>';

sorted.forEach((si,i)=>{const isDue=dueIds.has(si.id);const editing=schedEditId===si.id;
h+='<div class="card fi'+(isDue?' sched-due-card':'')+'"><div class="card-hd">';
h+=(isDue?'<span class="badge b-due">DUE</span>':'<span class="badge b-sched">ACTIVE</span>');
h+=' <h3 class="card-t">'+esc(si.name)+'</h3><p class="card-s">';
h+=esc(si.reason);
if(si.withWhom)h+=' \u00B7 With: '+esc(si.withWhom);
h+=' \u00B7 \uD83D\uDCF1 '+esc(si.phone||'no #');
h+='</p>';
if(si.notes)h+='<p class="card-s" style="margin-top:2px;font-style:italic">'+esc(si.notes)+'</p>';
// Show reminder config summary
const remParts=[];
if(si.recurDays>0)remParts.push('Every '+si.recurDays+'d');
if(si.aimForDate)remParts.push('Aim: '+fds(si.aimForDate));
if(si.noLaterDate)remParts.push('Deadline: '+fds(si.noLaterDate));
if(remParts.length)h+='<p class="card-s" style="margin-top:2px;font-size:10.5px">'+remParts.join(' \u00B7 ')+'</p>';
h+='</div>';

// Always show: quick-log bar + draft SMS if due
h+='<div style="padding:8px 15px 0;border-top:1px solid var(--border)">';
// Quick log buttons
h+='<p class="sl">Log contact attempt:</p>';
h+='<div class="qlog-btns">';
h+='<button class="qlog-btn ql-texted" onclick="qLog(\''+si.id+'\',\'texted\')">Texted</button>';
h+='<button class="qlog-btn ql-called" onclick="qLog(\''+si.id+'\',\'called\')">Called</button>';
h+='<button class="qlog-btn ql-spoke" onclick="qLog(\''+si.id+'\',\'spoke\')">Spoke</button>';
h+='<button class="qlog-btn ql-note" onclick="qLog(\''+si.id+'\',\'note\')">Note</button>';
h+='</div>';
h+='<input class="inp-s" id="ql-note-'+si.id+'" placeholder="Optional details..." style="margin-bottom:8px">';

// Draft SMS (expanded if due, collapsed if not)
if(isDue){
  h+='<p class="sl mt">Draft message:</p>';
  h+='<textarea class="ta" id="sd-'+si.id+'" rows="3">'+esc(getSchedDraft(si))+'</textarea>';
  h+='<button class="btn-send" onclick="schedSend(\''+si.id+'\')" style="margin-bottom:8px">\uD83D\uDCF1 Text to Schedule</button>';
} else {
  h+='<button class="xbtn" style="border-top:none;padding-left:0" onclick="tog(\'sdr-'+si.id+'\')"><span id="sdr-'+si.id+'-a">\u25BC</span> Show draft message</button>';
  h+='<div id="sdr-'+si.id+'" class="hidden">';
  h+='<textarea class="ta" id="sd-'+si.id+'" rows="3">'+esc(getSchedDraft(si))+'</textarea>';
  h+='<button class="btn-send" onclick="schedSend(\''+si.id+'\')" style="margin-bottom:8px">\uD83D\uDCF1 Text to Schedule</button>';
  h+='</div>';
}

// Activity log
const logs=si.log||[];
if(logs.length){
  h+='<div style="margin-top:6px"><p class="sl">Activity log'+(logs.length>3?' <button class="btn-sm btn-sm-g" style="padding:2px 6px;font-size:10px;margin-left:4px" onclick="tog(\'slog-'+si.id+'\')">Show all '+logs.length+'</button>':'')+'</p>';
  const showLogs=logs.length>3?logs.slice(0,3):logs;
  showLogs.forEach(l=>{h+='<div class="log-row"><span class="log-type t-'+l.type+'">'+l.type.charAt(0).toUpperCase()+l.type.slice(1)+'</span><span class="log-note">'+esc(l.note||'')+'</span><span class="log-ts">'+fdt(l.ts)+'</span></div>'});
  if(logs.length>3){
    h+='<div id="slog-'+si.id+'" class="hidden">';
    logs.slice(3).forEach(l=>{h+='<div class="log-row"><span class="log-type t-'+l.type+'">'+l.type.charAt(0).toUpperCase()+l.type.slice(1)+'</span><span class="log-note">'+esc(l.note||'')+'</span><span class="log-ts">'+fdt(l.ts)+'</span></div>'});
    h+='</div>';
  }
  h+='</div>';
}

// Action buttons
h+='<div style="display:flex;gap:6px;margin-top:10px;padding-bottom:12px;flex-wrap:wrap">';
h+='<button class="btn-sm btn-sm-p" onclick="schedDone(\''+si.id+'\')">\u2713 Done</button>';
h+='<button class="btn-sm btn-sm-g" onclick="schedEditId=\''+si.id+'\';showSF=true;render()">\u270F\uFE0F Edit</button>';
h+='<button class="btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="schedRm(\''+si.id+'\')">\uD83D\uDDD1</button>';
h+='</div></div></div>'});

// Completed section
if(done.length){
  h+='<div class="mt" style="margin-top:16px"><button class="xbtn" style="border:1px solid var(--border);border-radius:var(--radius)" onclick="showDone=!showDone;render()"><span>'+(showDone?'\u25B2':'\u25BC')+'</span> Completed ('+done.length+')</button>';
  if(showDone){h+='<div style="margin-top:6px">';
    done.forEach(si=>{h+='<div class="card" style="opacity:.7"><div class="card-hd"><span class="badge b-done">DONE</span><h3 class="card-t">'+esc(si.name)+'</h3><p class="card-s">'+esc(si.reason)+(si.doneDate?' \u00B7 Completed '+fds(si.doneDate):'')+'</p>';
    if(si.log&&si.log.length)h+='<p class="card-s" style="font-size:10.5px;margin-top:2px">'+si.log.length+' contact'+(si.log.length!==1?'s':'')+' logged</p>';
    h+='</div><div style="padding:4px 15px 10px"><button class="btn-sm btn-sm-g" onclick="schedUndone(\''+si.id+'\')">Reopen</button> <button class="btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="schedRm(\''+si.id+'\')">\uD83D\uDDD1</button></div></div>'});
  h+='</div>'}
  h+='</div>';
}
el.innerHTML=h}

function renderSchedForm(){
  const editing=schedEditId?D.schedItems.find(s=>s.id===schedEditId):null;
  const bNames=getBishopricNames();
  let h='<div class="fcard fi"><h3 class="ftitle">'+(editing?'Edit':'New')+' Schedule Item</h3>';
  h+='<input class="inp" id="si-name" placeholder="Full Name" value="'+esc(editing?editing.name:'')+'">';
  h+='<input class="inp" id="si-phone" placeholder="Phone Number" type="tel" value="'+esc(editing?editing.phone:'')+'">';
  h+='<select class="sel" id="si-reason">';
  SCHED_REASONS.forEach(r=>{h+='<option value="'+esc(r)+'"'+(editing&&editing.reason===r?' selected':'')+'>'+esc(r)+'</option>'});
  h+='</select>';
  h+='<input class="inp" id="si-reason-other" placeholder="Other reason (if Other selected)" value="'+esc(editing&&editing.reason&&!SCHED_REASONS.includes(editing.reason)?editing.reason:'')+'" style="display:none">';
  h+='<select class="sel" id="si-with"><option value="Bishop"'+(editing&&editing.withWhom==='Bishop'?' selected':'')+'>Bishop</option><option value="1st Counselor"'+(editing&&editing.withWhom==='1st Counselor'?' selected':'')+'>1st Counselor</option><option value="2nd Counselor"'+(editing&&editing.withWhom==='2nd Counselor'?' selected':'')+'>2nd Counselor</option></select>';
  if(bNames.length)h+='<p style="font-size:10.5px;color:var(--muted);margin:-4px 0 7px">'+bNames.join(' \u00B7 ')+'</p>';
  h+='<textarea class="inp" id="si-notes" placeholder="Notes (optional)" rows="2" style="resize:vertical">'+esc(editing?editing.notes:'')+'</textarea>';

  // Reminder options
  h+='<p class="sl mt">Reminder options (all optional)</p>';
  h+='<div class="opt-grid">';
  h+='<div><label style="font-size:11px;color:var(--muted)">Every X days</label><input class="inp" id="si-recur" type="number" min="0" max="90" placeholder="0 = off" value="'+(editing?editing.recurDays||'':'5')+'"></div>';
  h+='<div></div>';
  h+='<div><label style="font-size:11px;color:var(--muted)">Aim for date</label><input class="inp" id="si-aim" type="date" value="'+(editing?editing.aimForDate||'':'')+'"></div>';
  h+='<div><label style="font-size:11px;color:var(--muted)">No later than</label><input class="inp" id="si-nlt" type="date" value="'+(editing?editing.noLaterDate||'':'')+'"></div>';
  h+='</div>';

  // Draft SMS template
  h+='<p class="sl mt">Draft SMS template</p>';
  h+='<p style="font-size:10.5px;color:var(--muted);margin-bottom:4px">Use {name} for auto-fill. Leave blank for default.</p>';
  h+='<textarea class="ta" id="si-draft" rows="3" placeholder="Leave blank for default template...">'+esc(editing?editing.draftMsg:'')+'</textarea>';

  h+='<div class="factions mt"><button class="btn-p" onclick="saveSched()">'+(editing?'Update':'Add')+'</button><button class="btn-g" onclick="showSF=false;schedEditId=null;render()">Cancel</button></div></div>';
  return h;
}

function saveSched(){
  const name=document.getElementById('si-name').value.trim();
  const phone=document.getElementById('si-phone').value.trim();
  let reason=document.getElementById('si-reason').value;
  const reasonOther=document.getElementById('si-reason-other').value.trim();
  if(reason==='Other'&&reasonOther)reason=reasonOther;
  const withWhom=document.getElementById('si-with').value;
  const notes=document.getElementById('si-notes').value.trim();
  const recurDays=parseInt(document.getElementById('si-recur').value)||0;
  const aimForDate=document.getElementById('si-aim').value||'';
  const noLaterDate=document.getElementById('si-nlt').value||'';
  const draftMsg=document.getElementById('si-draft').value.trim();
  if(!name){alert('Enter a name.');return}

  if(schedEditId){
    D.schedItems=D.schedItems.map(s=>s.id===schedEditId?{...s,name,phone,reason,withWhom,notes,recurDays,aimForDate,noLaterDate,draftMsg}:s);
  }else{
    D.schedItems.push({id:uid(),name,phone,reason,withWhom,notes,draftMsg,recurDays,aimForDate,noLaterDate,log:[],dateAdded:new Date().toISOString(),done:false,doneDate:''});
  }
  sv(D);showSF=false;schedEditId=null;schedAllNotifs();render();toast(schedEditId?'Updated!':'Added!')
}

function qLog(id,type){
  const noteEl=document.getElementById('ql-note-'+id);
  const note=noteEl?noteEl.value.trim():'';
  D.schedItems=D.schedItems.map(s=>{
    if(s.id!==id)return s;
    const log=[{ts:new Date().toISOString(),type,note},...(s.log||[])];
    return{...s,log};
  });
  sv(D);schedAllNotifs();render();toast(type.charAt(0).toUpperCase()+type.slice(1)+' logged');
}

function schedSend(id){
  const si=D.schedItems.find(s=>s.id===id);if(!si||!si.phone)return;
  const msgEl=document.getElementById('sd-'+id);
  const msg=msgEl?msgEl.value:getSchedDraft(si);
  window.location.href=smsLink([si.phone],msg);
  // Auto-log the send
  D.schedItems=D.schedItems.map(s=>{
    if(s.id!==id)return s;
    const log=[{ts:new Date().toISOString(),type:'texted',note:'Sent via app: '+msg.slice(0,60)+(msg.length>60?'...':'')},...(s.log||[])];
    return{...s,log};
  });
  addHist('schedule','Text: '+si.name,1);sv(D);schedAllNotifs();setTimeout(render,500);
}

function schedDone(id){
  if(!confirm('Mark as completed?'))return;
  D.schedItems=D.schedItems.map(s=>s.id===id?{...s,done:true,doneDate:new Date().toISOString()}:s);
  sv(D);schedAllNotifs();render();toast('Marked done!')
}
function schedUndone(id){
  D.schedItems=D.schedItems.map(s=>s.id===id?{...s,done:false,doneDate:''}:s);
  sv(D);render();toast('Reopened.')
}
function schedRm(id){
  if(!confirm('Remove this item permanently?'))return;
  D.schedItems=D.schedItems.filter(s=>s.id!==id);
  sv(D);render()
}

// Show/hide "Other" reason field
document.addEventListener('change',function(e){
  if(e.target.id==='si-reason'){
    const oth=document.getElementById('si-reason-other');
    if(oth)oth.style.display=e.target.value==='Other'?'block':'none';
  }
});

// Settings
function rSet(){const el=document.getElementById('tab-settings');const st={c:(D.contacts||[]).length,s:(D.schedItems||[]).filter(s=>!s.done).length,sd:(D.schedItems||[]).filter(s=>s.done).length,t:Object.keys(D.tpl||{}).length,h:(D.history||[]).length};
let h='<h2 class="stitle">Settings</h2>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Data Summary</p><p style="font-size:13px;margin:6px 0">\uD83D\uDCC7 <strong>'+st.c+'</strong> contacts \u00B7 \uD83D\uDCC5 <strong>'+st.s+'</strong> scheduled'+(st.sd?' ('+st.sd+' done)':'')+' \u00B7 \uD83D\uDCDD <strong>'+st.t+'</strong> templates \u00B7 \uD83D\uDCCA <strong>'+st.h+'</strong> history</p></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Exclude My Number</p><p class="hint" style="margin-top:4px">Auto-uncheck your number from recipients.</p><input class="inp" id="excl-ph" placeholder="Your phone number" type="tel" value="'+esc(D.excludeMe)+'" style="margin-bottom:4px"><button class="btn-sm btn-sm-p" onclick="D.excludeMe=document.getElementById(\'excl-ph\').value.trim();sv(D);cardRS={};toast(\'Saved!\');render()">Save</button></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Notifications</p><p style="font-size:13px;margin:6px 0">'+(D.notifEnabled?'\u2705 Enabled':'\u274C Disabled')+'</p><div class="arow">'+(D.notifEnabled?'<button class="btn-g" onclick="D.notifEnabled=false;sv(D);render()">Disable</button>':'<button class="btn-p" onclick="enableNotif()">Enable</button>')+'<button class="btn-s" onclick="testNotif()">\uD83D\uDD14 Test Notification</button></div><div class="mt"><p class="sl">Notification Time</p><p class="hint">When should the daily reminder fire?</p><div style="display:flex;gap:6px;align-items:center"><input type="time" id="notif-time" value="'+String(D.notifHour).padStart(2,'0')+':'+String(D.notifMin).padStart(2,'0')+'" style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;font-family:var(--font)"><button class="btn-sm btn-sm-p" onclick="svNT()">Save</button></div></div></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Backup & Restore</p><p class="hint" style="margin-top:6px">Back up data to JSON. Restore on any device.</p><div class="arow"><button class="btn-p" onclick="doBackup()">\uD83D\uDCBE Backup</button><button class="btn-s" onclick="document.getElementById(\'restore-inp\').click()">\uD83D\uDCC2 Restore</button></div></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">History</p><button class="btn-g" onclick="if(confirm(\'Clear history?\')){D.history=[];sv(D);toast(\'Cleared.\');render()}">Clear History</button></div></div>';
h+='<div class="card" style="border-color:rgba(185,28,28,.2)"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl" style="color:var(--danger)">Danger Zone</p><button class="btn-d mt" onclick="resetAll()">\uD83D\uDDD1 Reset All Data</button></div></div>';
el.innerHTML=h}
function svNT(){const v=document.getElementById('notif-time').value;if(!v)return;const[h,m]=v.split(':').map(Number);D.notifHour=h;D.notifMin=m;sv(D);toast('Saved: '+v);schedAllNotifs()}
function doBackup(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='ward-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('Downloaded!')}
document.getElementById('restore-inp').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(!d.contacts){alert('Invalid.');return}if(!confirm('Replace all data?'))return;D=d;if(!D.schedItems)D.schedItems=[];if(!D.history)D.history=[];if(D.notifHour==null)D.notifHour=14;if(D.notifMin==null)D.notifMin=0;if(!D.excludeMe)D.excludeMe='';sv(D);toast('Restored!');render()}catch(err){alert('Error: '+err.message)}};r.readAsText(f);e.target.value=''});
function resetAll(){if(!confirm('DELETE all data?'))return;if(!confirm('Really sure?'))return;D=dd();sv(D);cardRS={};toast('Reset.');render()}

// Hash-based navigation on load
(function(){const h=location.hash.slice(1);if(h&&TABS.includes(h)){CT=h}render();if(CT!=='dashboard')go(CT)})();
</script>
