.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:13px}.toggle-row label{flex:1}.toggle{position:relative;width:44px;height:24px;flex-shrink:0}.toggle input{opacity:0;width:0;height:0}.toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;transition:.2s}.toggle .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}.toggle input:checked+.slider{background:var(--primary)}.toggle input:checked+.slider:before{transform:translateX(20px)}

const DMI=["Hello, this is Kevin Fluckiger from the Greenville 1st Ward of the Church of Jesus Christ of Latter-day Saints. Your records have recently been added to our directory. Welcome! Bishop "+B+" would like to meet with you to get to know you and welcome you to our ward. Would Sunday afternoon at the church building work for you?","Hi! This is Kevin Fluckiger, Executive Secretary in the Greenville 1st Ward. We're so glad to have you in our ward family! Bishop "+B+" would love the opportunity to meet you and say hello. Could we set up a time on a Sunday afternoon that works for you?","Hello! Kevin Fluckiger here from the Greenville 1st Ward. We noticed your records joined our ward recently \u2014 welcome! Bishop "+B+" enjoys meeting new members personally. Would you be available for a brief visit on a Sunday afternoon at the church?","Hi there! This is Kevin Fluckiger from the Greenville 1st Ward. We're excited to welcome you! Bishop "+B+" would like to get to know you. Are you available some Sunday afternoon for a short visit at the church building?","Hello! Kevin Fluckiger here, Executive Secretary in the Greenville 1st Ward. Welcome to our ward! Bishop "+B+" would love to meet with you. Would a Sunday afternoon work for a brief, friendly visit at the church?","Hi! This is Kevin Fluckiger from the Greenville 1st Ward. Just reaching out to welcome you \u2014 we're glad you're here! Bishop "+B+" likes to personally greet new members. Could we find a Sunday afternoon for a short visit?","Hello! Kevin Fluckiger with the Greenville 1st Ward here. Wanted to extend a warm welcome! Bishop "+B+" would enjoy meeting you in person. Would Sunday afternoon at the church be a good time for a brief hello?"];

function gmiTpl(){return(D.miTpl&&D.miTpl.length)?D.miTpl:DMI}
function wom(d){return Math.ceil(new Date(d).getDate()/7)}
function iqe(d){return[2,5,8,11].includes(new Date(d).getMonth())}
function fd(d){return new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function fdt(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function gtpl(mid,vl){const k=mid+'__'+vl;if(D.tpl&&D.tpl[k])return D.tpl[k];for(const m of M)if(m.id===mid)for(const v of m.v)if(v.l===vl)return v.dt;return''}
function stpl(mid,vl,txt){if(!D.tpl)D.tpl={};D.tpl[mid+'__'+vl]=txt;sv(D)}
function smsLink(ph,body){return'sms:'+ph.join(',')+'?body='+encodeURIComponent(body)}
function parseVCF(t){const cards=t.split('BEGIN:VCARD').filter(c=>c.trim());return cards.map(c=>{const ls=c.split(/\r?\n/);let n='',p='';for(const l of ls){if(l.startsWith('FN:')||l.startsWith('FN;'))n=l.split(':').slice(1).join(':').trim();if(!n&&l.startsWith('N:')){const pts=l.split(':').slice(1).join(':').split(';');n=[pts[1],pts[0]].filter(Boolean).join(' ').trim()}if(l.match(/^TEL[;:]/i)){const ph=l.split(':').slice(1).join(':').trim();if(ph&&!p)p=ph}}return{name:n,phone:p}}).filter(c=>c.name||c.phone)}
function resR(roles){return(D.contacts||[]).filter(c=>roles.includes(c.role))}
function isExcl(phone){return D.excludeMe&&phone&&phone.replace(/\D/g,'')===D.excludeMe.replace(/\D/g,'')}
function addHist(type,title,cnt){if(!D.history)D.history=[];D.history.unshift({type,title,count:cnt,date:new Date().toISOString()});if(D.history.length>100)D.history=D.history.slice(0,100);sv(D)}

function getUp(days){const now=new Date(),res=[];for(let d=0;d<=days;d++){const dt=new Date(now);dt.setDate(dt.getDate()+d);const dow=dt.getDay(),wk=wom(dt),qe=iqe(dt);for(const m of M){if(m.dow!==dow)continue;for(const v of m.v){if(!v.w.includes(wk))continue;if(v.qe===true&&!qe)continue;if(v.qe===false&&qe)continue;let tpl=gtpl(m.id,v.l).replace('{weekOrd}',ord(wk));res.push({mid:m.id,name:m.n,vl:v.l,date:new Date(dt),time:m.t,loc:m.loc,roles:v.r,note:v.nt,tpl,du:d})}}}return res.sort((a,b)=>a.date-b.date)}

function getMID(){const now=new Date(),tpls=gmiTpl(),delay=D.moveInDelay||0;return(D.moveIns||[]).map(mi=>{const k='mi-'+mi.id,last=D.sent[k]?new Date(D.sent[k]):null;const added=new Date(mi.dateAdded);if(delay>0&&Math.floor((now-added)/864e5)<delay&&!last)return null;let due=!last||Math.floor((now-last)/864e5)>=5;const idx=(mi.rc||0)%tpls.length;return{...mi,due,msg:tpls[idx],rk:k}}).filter(m=>m&&m.due)}

let cardRS={};
function getCR(key,defs){if(!cardRS[key]){cardRS[key]={ck:{},ex:[]};defs.forEach(c=>{cardRS[key].ck[c.id]=!isExcl(c.phone)})}return cardRS[key]}

const TABS=['dashboard','meetings','contacts','compose','moveins','settings'];
let CT='dashboard';
function go(id){CT=id;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');document.querySelectorAll('.nav button').forEach((b,i)=>{b.classList.toggle('active',TABS[i]===id)});render()}
function render(){({dashboard:rDash,meetings:rMeet,contacts:rCont,compose:rComp,moveins:rMI,settings:rSet})[CT]()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500)}
function tog(id){const el=document.getElementById(id),ar=document.getElementById(id+'-a');if(el.classList.contains('hidden')){el.classList.remove('hidden');if(ar)ar.textContent='\u25B2'}else{el.classList.add('hidden');if(ar)ar.textContent='\u25BC'}}

// Notifications
async function enableNotif(){if(!('Notification' in window)){alert('Not supported.');return}const p=await Notification.requestPermission();if(p==='granted'){D.notifEnabled=true;sv(D);schedNotif();toast('Enabled!');render()}else alert('Denied.')}
function schedNotif(){if(!D.notifEnabled||!('serviceWorker' in navigator))return;const up=getUp(2).filter(m=>m.du===1);if(!up.length)return;const now=new Date(),tgt=new Date(now);tgt.setHours(D.notifHour||14,D.notifMin||0,0,0);let dl=tgt-now;if(dl<0)dl=0;if(navigator.serviceWorker.controller)navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIFICATION',title:'Ward Reminders Ready',body:up.length+' reminder'+(up.length>1?'s':'')+' for tomorrow: '+up.map(m=>m.name).join(', '),delay:Math.max(0,dl)})}
function testNotif(){if(!('Notification' in window)){alert('Not supported.');return}if(Notification.permission!=='granted'){Notification.requestPermission().then(p=>{if(p==='granted')doTest();else alert('Denied.')});return}doTest()}
function doTest(){const nxt=new Date();nxt.setDate(nxt.getDate()+(7-nxt.getDay())%7||7);const wk=wom(nxt);const vr=M[0].v.find(v=>v.w.includes(wk))||M[0].v[0];const rc=resR(vr.r).length;const title='Ward Reminders Ready';const body='2 meeting reminders to send for tomorrow: Ward Council ('+vr.l+'), Bishopric Meeting \u2014 '+rc+' recipients ready';if(navigator.serviceWorker&&navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'SCHEDULE_NOTIFICATION',title,body,delay:3000});toast('Test notification in 3 seconds...')}else{setTimeout(()=>new Notification(title,{body,vibrate:[200,100,200],tag:'ward-test',requireInteraction:true}),3000);toast('Test notification in 3 seconds...')}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(()=>{if(D.notifEnabled)schedNotif()}).catch(e=>console.log('SW:',e))}

// Send
function doSend(phones,msg,ht,htitle){if(!phones.length){alert('No recipients with phone numbers.');return}if(D.sendMode==='individual'){window.location.href=smsLink([phones[0]],msg);if(phones.length>1){sessionStorage.setItem('ps',JSON.stringify({p:phones.slice(1),m:msg}));setTimeout(()=>{if(confirm('Sent to 1. Send to next? ('+(phones.length-1)+' left)')){sendNxt()}},1500)}}else{window.location.href=smsLink(phones,msg)}addHist(ht,htitle,phones.length)}
function sendNxt(){const pd=JSON.parse(sessionStorage.getItem('ps')||'null');if(!pd||!pd.p.length)return;window.location.href=smsLink([pd.p[0]],pd.m);pd.p=pd.p.slice(1);sessionStorage.setItem('ps',JSON.stringify(pd));if(pd.p.length)setTimeout(()=>{if(confirm('Next? ('+pd.p.length+' left)')){sendNxt()}},1500)}

if(!D.notifEnabled&&'Notification' in window)h+='<div class="notif-bar"><p>\uD83D\uDCE2 Enable notifications for automatic reminders.</p><button class="btn-sm btn-sm-p" onclick="enableNotif()">Enable</button></div>';
h+='<h2 class="stitle">Upcoming Reminders</h2>';
if(!up.length&&!mid.length)h+='<div class="empty"><p class="empty-i">\u2713</p><p class="empty-t">No reminders due this week!</p></div>';
up.forEach((m,i)=>{const rec=resR(m.roles);const allC=D.contacts||[];const ck='d'+i;const cs=getCR(ck,rec);const exC=cs.ex.map(id=>allC.find(c=>c.id===id)).filter(Boolean);const allR=[...rec,...exC.filter(e=>!rec.find(r=>r.id===e.id))];const miss=m.roles.filter(r=>!rec.find(c=>c.role===r));const bc=m.du===0?'b-today':m.du===1?'b-tmrw':'b-later';const bt=m.du===0?'TODAY':m.du===1?'TOMORROW':fd(m.date);
h+='<div class="card fi"><div class="card-hd"><span class="badge '+bc+'">'+bt+'</span><h3 class="card-t">'+m.name+'</h3><p class="card-s">'+m.vl+' \u00B7 '+m.time+' \u00B7 '+m.loc+'</p></div>';

h+='<div id="e'+i+'" class="card-bd hidden">';
if(m.note)h+='<p class="note">\u2139\uFE0F '+esc(m.note)+'</p>';
h+='<div class="mt"><p class="sl">Recipients \u2014 check/uncheck to include:</p><div class="recip-list">';
allR.forEach(r=>{const chk=cs.ck[r.id]!==false;h+='<label class="recip-item"><input type="checkbox" '+(chk?'checked':'')+' onchange="toggleR(\''+ck+'\',\''+r.id+'\',this.checked)"><span class="rn">'+esc(r.name)+'</span><span class="rr">'+esc(r.role)+'</span><span class="rp">'+esc(r.phone||'no #')+'</span>'+(isExcl(r.phone)?' <span style="color:var(--muted);font-size:9px">(you)</span>':'')+'</label>'});
h+='</div><button class="add-recip-btn" onclick="tog(\'ar'+i+'\')">+ Add recipient</button>';
h+='<div id="ar'+i+'" class="hidden add-recip-sel"><select class="sel-s" id="ars'+i+'" style="flex:1"><option value="">Select contact...</option>';
allC.filter(c=>!allR.find(r=>r.id===c.id)).forEach(c=>{h+='<option value="'+c.id+'">'+esc(c.name)+' ('+esc(c.role)+')</option>'});
h+='</select><button class="btn-sm btn-sm-p" onclick="addExR(\''+ck+'\','+i+')">Add</button></div></div>';
if(miss.length)h+='<div class="wb"><p>\u26A0\uFE0F No contacts for: '+esc(miss.join(', '))+'</p></div>';
h+='<div class="mt"><p class="sl">Message:</p><textarea class="ta" id="dm'+i+'" rows="6">'+esc(m.tpl)+'</textarea></div>';
h+='<button class="btn-send" onclick="dSend('+i+',\''+ck+'\')">\uD83D\uDCF1 '+(D.sendMode==='individual'?'Send Individually':'Send Group Message')+'</button>';
h+='</div></div>'});

if(mid.length){h+='<h2 class="stitle" style="margin-top:20px">Move-In Follow-ups</h2>';
mid.forEach((mi,i)=>{h+='<div class="card fi"><div class="card-hd"><span class="badge b-mi">MOVE-IN</span><h3 class="card-t">'+esc(mi.name)+'</h3><p class="card-s">\uD83D\uDCF1 '+esc(mi.phone)+' \u00B7 Added '+fd(mi.dateAdded)+' \u00B7 '+(mi.rc||0)+' sent</p></div><button class="xbtn" onclick="tog(\'md'+i+'\')"><span id="md'+i+'-a">\u25BC</span> Show & send</button><div id="md'+i+'" class="card-bd hidden"><div class="mt"><p class="sl">Message:</p><textarea class="ta" id="mm'+i+'" rows="5">'+esc(mi.msg)+'</textarea></div><button class="btn-send" onclick="miSend(\''+mi.id+'\',\''+mi.rk+'\',\'mm'+i+'\',\''+esc(mi.phone)+'\')">\uD83D\uDCF1 Send Welcome</button></div></div>'})}

if(D.history&&D.history.length){h+='<h2 class="stitle" style="margin-top:20px">Recent Activity</h2><div class="card"><div class="card-bd" style="border-top:none;padding-top:12px">';
D.history.slice(0,15).forEach(hi=>{const ic=hi.type==='meeting'?'\uD83D\uDCC5':hi.type==='movein'?'\uD83C\uDFE0':hi.type==='compose'?'\u2709\uFE0F':'\uD83D\uDCCB';h+='<div class="hist-item">'+ic+' <span class="hist-title">'+esc(hi.title)+'</span> \u2014 '+hi.count+' recipient'+(hi.count!==1?'s':'')+'<br><span class="hist-date">'+fdt(hi.date)+'</span></div>'});h+='</div></div>'}
el.innerHTML=h}

function toggleR(ck,cid,v){if(cardRS[ck])cardRS[ck].ck[cid]=v}
function addExR(ck,i){const s=document.getElementById('ars'+i);if(!s.value)return;if(!cardRS[ck])return;cardRS[ck].ex.push(s.value);cardRS[ck].ck[s.value]=true;rDash()}
function dSend(idx,ck){const up=getUp(7);if(idx>=up.length)return;const m=up[idx];const rec=resR(m.roles);const allC=D.contacts||[];const cs=cardRS[ck]||{ck:{},ex:[]};const exC=cs.ex.map(id=>allC.find(c=>c.id===id)).filter(Boolean);const allR=[...rec,...exC.filter(e=>!rec.find(r=>r.id===e.id))];const sel=allR.filter(r=>cs.ck[r.id]!==false);const ph=sel.map(r=>r.phone).filter(Boolean);const msg=document.getElementById('dm'+idx).value;doSend(ph,msg,'meeting',m.name+' ('+m.vl+')')}
function miSend(id,rk,mid,phone){const msg=document.getElementById(mid).value;window.location.href=smsLink([phone],msg);D.sent[rk]=new Date().toISOString();D.moveIns=D.moveIns.map(m=>m.id===id?{...m,rc:(m.rc||0)+1}:m);addHist('movein','Welcome: '+(D.moveIns.find(m=>m.id===id)?.name||''),1);sv(D);setTimeout(render,500)}

// Meetings

M.forEach((m,mi)=>{h+='<div class="card"><button class="mhdr" onclick="tog(\'mt'+mi+'\')"><div><h3 class="card-t">'+esc(m.n)+'</h3><p class="card-s">'+m.t+' \u00B7 '+m.loc+'</p></div><span class="chev" id="mt'+mi+'-a">\u25BC</span></button><div id="mt'+mi+'" class="card-bd hidden">';
m.v.forEach((v,vi)=>{h+='<div class="vb"><p class="vl">'+esc(v.l)+'</p><div class="rl">'+v.r.map(r=>'<span class="rc">'+esc(r)+'</span>').join('')+'</div>'+(v.nt?'<p class="vn">'+esc(v.nt)+'</p>':'')+'<div class="tpl-s"><p class="tpl-sl">Reminder Template</p><textarea class="tpl-area" id="tp-'+m.id+'-'+vi+'" rows="4">'+esc(gtpl(m.id,v.l))+'</textarea><div class="factions"><button class="btn-sm btn-sm-p" onclick="svTpl(\''+m.id+'\',\''+esc(v.l)+'\',\'tp-'+m.id+'-'+vi+'\')">Save</button><button class="btn-sm btn-sm-g" onclick="rsTpl(\''+m.id+'\',\''+esc(v.l)+'\',\'tp-'+m.id+'-'+vi+'\','+mi+','+vi+')">Reset</button></div></div></div>'});
h+='</div></div>'});
const tpls=gmiTpl();h+='<h2 class="stitle" style="margin-top:20px">Move-In Welcome Templates</h2><div class="card"><div class="card-bd" style="border-top:none;padding-top:14px">';
tpls.forEach((t,i)=>{h+='<div class="tpl-s"'+(i===0?' style="border-top:none;padding-top:0"':'')+'><p class="tpl-sl">Variant '+(i+1)+'</p><textarea class="tpl-area" id="mit'+i+'" rows="3">'+esc(t)+'</textarea></div>'});
h+='<div class="factions mt"><button class="btn-sm btn-sm-p" onclick="svMIT()">Save All</button><button class="btn-sm btn-sm-g" onclick="rsMIT()">Reset</button></div></div></div>';el.innerHTML=h}
function svTpl(mid,vl,tid){stpl(mid,vl,document.getElementById(tid).value);toast('Saved!')}
function rsTpl(mid,vl,tid,mi,vi){if(D.tpl)delete D.tpl[mid+'__'+vl];sv(D);document.getElementById(tid).value=M[mi].v[vi].dt;toast('Reset.')}
function svMIT(){const t=[];gmiTpl().forEach((_,i)=>{const el=document.getElementById('mit'+i);if(el)t.push(el.value)});D.miTpl=t;sv(D);toast('Saved!')}

// Contacts
let cSrch='',showAF=false,editId=null;
function rCont(){const el=document.getElementById('tab-contacts');const cs=(D.contacts||[]).filter(c=>c.name.toLowerCase().includes(cSrch.toLowerCase())||c.role.toLowerCase().includes(cSrch.toLowerCase())).sort((a,b)=>a.role.localeCompare(b.role)||a.name.localeCompare(b.name));const grp={};cs.forEach(c=>{if(!grp[c.role])grp[c.role]=[];grp[c.role].push(c)});
let h='<h2 class="stitle">Contacts Directory</h2>';
h+='<div class="arow"><button class="btn-p" onclick="showAF=true;render()">+ Add</button><button class="btn-s" onclick="document.getElementById(\'vcf-inp\').click()">\uD83D\uDCC1 Import VCF(s)</button></div>';
h+='<input class="sinp" type="text" placeholder="Search by name or role..." value="'+esc(cSrch)+'" oninput="cSrch=this.value;rCont()">';
if(showAF){h+='<div class="fcard fi"><h3 class="ftitle">New Contact</h3><input class="inp" id="an" placeholder="Full Name"><input class="inp" id="ap" placeholder="Phone Number" type="tel"><select class="sel" id="ar">'+ROLES.map(r=>'<option value="'+esc(r)+'">'+esc(r)+'</option>').join('')+'</select><div class="factions"><button class="btn-p" onclick="addC()">Save</button><button class="btn-g" onclick="showAF=false;render()">Cancel</button></div></div>'}
if(!Object.keys(grp).length)h+='<div class="empty"><p class="empty-i">\uD83D\uDC65</p><p class="empty-t">No contacts yet.</p></div>';
Object.entries(grp).forEach(([role,mems])=>{h+='<div class="rgrp"><p class="rgrp-l">'+esc(role)+' ('+mems.length+')</p>';
mems.forEach(c=>{if(editId===c.id){h+='<div class="crow" style="flex-direction:column;align-items:stretch"><input class="inp-s" id="en'+c.id+'" value="'+esc(c.name)+'"><input class="inp-s" id="ep'+c.id+'" value="'+esc(c.phone)+'" type="tel"><select class="sel-s" id="er'+c.id+'">'+ROLES.map(r=>'<option value="'+esc(r)+'"'+(r===c.role?' selected':'')+'>'+esc(r)+'</option>').join('')+'</select><div style="display:flex;gap:6px;margin-top:4px"><button class="btn-sm btn-sm-p" onclick="svC(\''+c.id+'\')">Save</button><button class="btn-sm btn-sm-g" onclick="editId=null;render()">Cancel</button></div></div>'}else{h+='<div class="crow"><div><p class="cn">'+esc(c.name)+'</p><p class="cp">'+esc(c.phone||'No phone')+(isExcl(c.phone)?' <em>(you)</em>':'')+'</p></div><div class="ca"><button class="btn-i" onclick="editId=\''+c.id+'\';render()">\u270F\uFE0F</button><button class="btn-i" onclick="delC(\''+c.id+'\')">\uD83D\uDDD1</button></div></div>'}});h+='</div>'});el.innerHTML=h}
function addC(){const n=document.getElementById('an').value.trim(),p=document.getElementById('ap').value.trim(),r=document.getElementById('ar').value;if(!n){alert('Enter a name.');return}D.contacts.push({id:uid(),name:n,phone:p,role:r});sv(D);showAF=false;render()}
function svC(id){const n=document.getElementById('en'+id).value.trim(),p=document.getElementById('ep'+id).value.trim(),r=document.getElementById('er'+id).value;D.contacts=D.contacts.map(c=>c.id===id?{...c,name:n,phone:p,role:r}:c);sv(D);editId=null;render()}
function delC(id){if(confirm('Remove?')){D.contacts=D.contacts.filter(c=>c.id!==id);sv(D);render()}}
document.getElementById('vcf-inp').addEventListener('change',function(e){const files=Array.from(e.target.files);if(!files.length)return;let tot=0,done=0;files.forEach(f=>{const r=new FileReader();r.onload=function(ev){const p=parseVCF(ev.target.result);p.forEach(c=>D.contacts.push({id:uid(),name:c.name,phone:c.phone,role:'Other'}));tot+=p.length;done++;if(done===files.length){sv(D);alert('Imported '+tot+' contact(s) from '+files.length+' file(s). Assign roles.');render()}};r.readAsText(f)});e.target.value=''});

function rSet(){const el=document.getElementById('tab-settings');const st={c:(D.contacts||[]).length,m:(D.moveIns||[]).length,t:Object.keys(D.tpl||{}).length,h:(D.history||[]).length};
let h='<h2 class="stitle">Settings</h2>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Data Summary</p><p style="font-size:13px;margin:6px 0">\uD83D\uDCC7 <strong>'+st.c+'</strong> contacts \u00B7 \uD83C\uDFE0 <strong>'+st.m+'</strong> move-ins \u00B7 \uD83D\uDCDD <strong>'+st.t+'</strong> templates \u00B7 \uD83D\uDCCA <strong>'+st.h+'</strong> history</p></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Send Mode</p><div class="toggle-row"><label>Send individually (one per recipient)</label><div class="toggle"><input type="checkbox" '+(D.sendMode==='individual'?'checked':'')+' onchange="D.sendMode=this.checked?\'individual\':\'group\';sv(D);render()"><span class="slider"></span></div></div><p class="hint" style="margin-top:4px">'+(D.sendMode==='individual'?'Separate text per person.':'All in one group message.')+'</p></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Exclude My Number</p><p class="hint" style="margin-top:4px">Auto-uncheck your number from recipients.</p><input class="inp" id="excl-ph" placeholder="Your phone number" type="tel" value="'+esc(D.excludeMe)+'" style="margin-bottom:4px"><button class="btn-sm btn-sm-p" onclick="D.excludeMe=document.getElementById(\'excl-ph\').value.trim();sv(D);cardRS={};toast(\'Saved!\');render()">Save</button></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Notifications</p><p style="font-size:13px;margin:6px 0">'+(D.notifEnabled?'\u2705 Enabled':'\u274C Disabled')+'</p><div class="arow">'+(D.notifEnabled?'<button class="btn-g" onclick="D.notifEnabled=false;sv(D);render()">Disable</button>':'<button class="btn-p" onclick="enableNotif()">Enable</button>')+'<button class="btn-s" onclick="testNotif()">\uD83D\uDD14 Test Notification</button></div><div class="mt"><p class="sl">Notification Time</p><p class="hint">When should the daily reminder fire?</p><div style="display:flex;gap:6px;align-items:center"><input type="time" id="notif-time" value="'+String(D.notifHour).padStart(2,'0')+':'+String(D.notifMin).padStart(2,'0')+'" style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;font-family:var(--font)"><button class="btn-sm btn-sm-p" onclick="svNT()">Save</button></div></div></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Move-In First Message Delay</p><p class="hint">Days before first welcome message (0 = immediate).</p><div style="display:flex;gap:6px;align-items:center"><input type="number" id="mi-del" min="0" max="30" value="'+(D.moveInDelay||0)+'" style="border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;width:80px;font-family:var(--font)"><span style="font-size:13px;color:var(--muted)">days</span><button class="btn-sm btn-sm-p" onclick="D.moveInDelay=parseInt(document.getElementById(\'mi-del\').value)||0;sv(D);toast(\'Saved!\')">Save</button></div></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">Backup & Restore</p><p class="hint" style="margin-top:6px">Back up data to JSON. Restore on any device.</p><div class="arow"><button class="btn-p" onclick="doBackup()">\uD83D\uDCBE Backup</button><button class="btn-s" onclick="document.getElementById(\'restore-inp\').click()">\uD83D\uDCC2 Restore</button></div></div></div>';
h+='<div class="card"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl">History</p><button class="btn-g" onclick="if(confirm(\'Clear history?\')){D.history=[];sv(D);toast(\'Cleared.\');render()}">Clear History</button></div></div>';
h+='<div class="card" style="border-color:rgba(185,28,28,.2)"><div class="card-bd" style="border-top:none;padding-top:14px"><p class="sl" style="color:var(--danger)">Danger Zone</p><button class="btn-d mt" onclick="resetAll()">\uD83D\uDDD1 Reset All Data</button></div></div>';
el.innerHTML=h}
function svNT(){const v=document.getElementById('notif-time').value;if(!v)return;const[h,m]=v.split(':').map(Number);D.notifHour=h;D.notifMin=m;sv(D);toast('Saved: '+v);if(D.notifEnabled)schedNotif()}
function doBackup(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='ward-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('Downloaded!')}
document.getElementById('restore-inp').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(!d.contacts){alert('Invalid.');return}if(!confirm('Replace all data?'))return;D=d;if(!D.history)D.history=[];if(D.notifHour==null)D.notifHour=14;if(D.notifMin==null)D.notifMin=0;if(!D.excludeMe)D.excludeMe='';if(!D.sendMode)D.sendMode='group';if(D.moveInDelay==null)D.moveInDelay=0;sv(D);toast('Restored!');render()}catch(err){alert('Error: '+err.message)}};r.readAsText(f);e.target.value=''});
function resetAll(){if(!confirm('DELETE all data?'))return;if(!confirm('Really sure?'))return;D=dd();sv(D);cardRS={};toast('Reset.');render()}

render();
</script>
</body>
</html>
